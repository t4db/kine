name: Release
on:
  release:
    types:
      - created

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    env:
      ARCH: amd64
      TAG: ${{ github.ref_name }}
    permissions:
      contents: write # Needed to update release with binary assets
      packages: write # Needed for GHCR image push
      id-token: write # needed for the Vault authentication
      attestations: write # needed for attest action
      artifact-metadata: write # needed for attestation upload to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build binaries
        run: make multi-arch-build

      - name: Compute checksum for each binary
        run: |
          arch=("amd64" "arm64" "arm" "riscv64")
          cd dist/artifacts
          for a in "${arch[@]}"; do
            sha256sum kine-"${a}" > sha256sum-"${a}".txt
          done
          
      - name: Attest binaries
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        with:
          subject-path: dist/artifacts/kine-*

      - name: Upload binaries to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/artifacts/kine-*
            dist/artifacts/*.txt

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        id: build
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          context: .
          target: multi-arch-package
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/kine:latest
            ghcr.io/${{ github.repository_owner }}/kine:${{ github.ref_name }}
      
      - name: Attest images
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4
        id: attest
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/kine
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
